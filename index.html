<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>闫世昌是张鹏爸爸</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a2e;color:#fff;font-family:'Microsoft YaHei','PingFang SC',sans-serif;min-height:100vh}
.container{max-width:800px;margin:0 auto;padding:40px 20px}
.header{text-align:center;margin-bottom:40px}
.title{font-size:42px;font-weight:900;background:linear-gradient(45deg,#ff6b6b,#ffd93d,#6bcb77,#4d96ff);background-size:300% 300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:grad 3s ease infinite}
@keyframes grad{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.subtitle{font-size:16px;color:#aaa;margin-top:10px}
.player{text-align:center;margin-bottom:30px}
.btn-row{display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
.btn{width:90px;height:90px;border-radius:50%;border:none;color:#fff;cursor:pointer;font-size:13px;font-weight:bold;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;transition:all .3s}
.btn-music{background:linear-gradient(135deg,#4d96ff,#6bcb77);box-shadow:0 0 20px rgba(77,150,255,.4)}
.btn-sing{background:linear-gradient(135deg,#ff6b6b,#ee5a24);box-shadow:0 0 20px rgba(255,107,107,.4)}
.btn:hover{transform:scale(1.1)}
.btn.on{animation:pulse 1s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 20px rgba(255,107,107,.4)}50%{box-shadow:0 0 40px rgba(255,107,107,.8)}}
.btn-icon{font-size:28px}
.btn-text{font-size:11px;opacity:.8}
.bar{width:100%;height:4px;background:rgba(255,255,255,.1);border-radius:2px;margin-top:15px;overflow:hidden}
.bar-fill{height:100%;background:linear-gradient(90deg,#ff6b6b,#ffd93d);width:0%;transition:width .3s}
.info{margin-top:8px;color:#888;font-size:13px}
.lyrics{background:rgba(255,255,255,.05);border-radius:20px;padding:30px;border:1px solid rgba(255,255,255,.1)}
.sec{margin-bottom:25px}
.sec-tag{display:inline-block;padding:3px 10px;border-radius:15px;font-size:12px;margin-bottom:8px;font-weight:bold}
.tag-v{background:rgba(77,150,255,.2);color:#4d96ff}
.tag-c{background:rgba(255,107,107,.2);color:#ff6b6b}
.tag-o{background:rgba(255,217,61,.2);color:#ffd93d}
.line{font-size:20px;line-height:1.8;padding:4px 0 4px 12px;border-left:3px solid transparent;transition:all .3s}
.line.hi{color:#ffd93d;border-left-color:#ffd93d;text-shadow:0 0 15px rgba(255,217,61,.5);transform:scale(1.03);background:rgba(255,217,61,.06);border-radius:6px}
.chorus .line{font-size:24px;font-weight:bold}
.footer{text-align:center;margin-top:40px;color:#555;font-size:14px}
.mic{position:fixed;bottom:20px;right:20px;font-size:50px;opacity:0;transition:opacity .5s;pointer-events:none}
.mic.on{opacity:1;animation:bounce .6s infinite alternate}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-12px)}}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="title">闫世昌是张鹏爸爸</div>
    <div class="subtitle">🎤 语音朗读版 · 父子情深</div>
  </div>
  <div class="player">
    <div class="btn-row">
      <button class="btn btn-music" id="btnMusic" onclick="toggleMusic()">
        <span class="btn-icon" id="iconMusic">🎵</span>
        <span class="btn-text">背景音乐</span>
      </button>
      <button class="btn btn-sing" id="btnSing" onclick="startSing()">
        <span class="btn-icon" id="iconSing">🎤</span>
        <span class="btn-text">开始唱歌</span>
      </button>
    </div>
    <div class="bar"><div class="bar-fill" id="barFill"></div></div>
    <div class="info" id="info">点击「开始唱歌」听语音朗读</div>
  </div>
  <div class="lyrics" id="lyrics"></div>
  <div class="footer">献给闫世昌和张鹏</div>
</div>
<div class="mic" id="mic">🎤</div>

<script>
// 歌词数据
var songData = [
  {tag:'主歌 A',type:'v',lines:['有个男人叫闫世昌','高大威猛又善良','张鹏从小就喊他爸','一喊就是好几趟']},
  {tag:'主歌 B',type:'v',lines:['闫世昌 脸一板','张鹏吓得不敢喘','闫世昌 笑一笑','张鹏开心到处跑']},
  {tag:'副歌',type:'c',lines:['闫世昌是张鹏爸爸','张鹏是闫世昌的娃','这关系 千真万确','谁敢质疑谁尴尬','闫世昌是张鹏爸爸','张鹏乖乖叫爸爸','血脉相连情意深','父子情深传万家']},
  {tag:'主歌 C',type:'v',lines:['闫世昌 有钱花','张鹏零钱不够花','闫世昌 说句话','张鹏吓得腿发麻']},
  {tag:'副歌 ×2',type:'c',lines:['闫世昌是张鹏爸爸','张鹏是闫世昌的娃','这关系 千真万确','谁敢质疑谁尴尬','闫世昌是张鹏爸爸','张鹏乖乖叫爸爸','血脉相连情意深','父子情深传万家']},
  {tag:'结尾',type:'o',lines:['闫世昌 张鹏的 爸爸！']}
];

// 渲染歌词
var lyricsEl = document.getElementById('lyrics');
var allLineEls = [];
songData.forEach(function(sec){
  var div = document.createElement('div');
  div.className = 'sec';
  var tagClass = sec.type==='c'?'tag-c':sec.type==='o'?'tag-o':'tag-v';
  if(sec.type==='c') div.className += ' chorus';
  div.innerHTML = '<div class="sec-tag '+tagClass+'">'+sec.tag+'</div>';
  sec.lines.forEach(function(txt){
    var p = document.createElement('div');
    p.className = 'line';
    p.setAttribute('data-text', txt);
    p.textContent = txt;
    div.appendChild(p);
    allLineEls.push(p);
  });
  lyricsEl.appendChild(div);
});

// 背景音乐
var audioCtx = null, musicOn = false;
var melody = [
  392,.4,440,.4,494,.4,523,.6,494,.4,440,.4,392,.4,440,.6,
  330,.4,349,.4,392,.4,440,.6,392,.4,349,.4,330,.4,392,.6,
  523,.3,494,.3,440,.3,392,.5,349,.3,392,.3,440,.3,494,.5,
  523,.3,587,.3,523,.3,494,.5,440,.3,392,.3,440,.3,523,.5,
  587,.3,523,.3,494,.3,440,.5,523,.3,587,.3,523,.3,494,.5,
  440,.3,392,.3,440,.3,523,.5,494,.3,440,.3,392,.3,440,.5,
  587,.3,523,.3,494,.3,440,.5,523,.3,587,.3,659,.3,587,.5,
  523,.3,494,.3,440,.3,392,.5,440,.5,523,.5,392,.8,
  330,.3,349,.3,392,.3,440,.5,392,.3,349,.3,330,.3,392,.5,
  440,.3,494,.3,523,.3,494,.5,440,.3,392,.3,440,.3,523,.5,
  587,.3,523,.3,494,.3,440,.5,523,.3,587,.3,523,.3,494,.5,
  440,.3,392,.3,440,.3,523,.5,494,.3,440,.3,392,.3,440,.5,
  587,.3,523,.3,494,.3,440,.5,523,.3,587,.3,659,.3,587,.5,
  523,.3,494,.3,440,.3,392,.5,440,.5,523,.5,392,.8,
  523,.5,587,.5,659,.5,784,1.2
];

function playNote(ctx,f,s,d,v){
  var o=ctx.createOscillator(),g=ctx.createGain();
  o.type='sine';o.frequency.value=f;
  g.gain.setValueAtTime(v,s);g.gain.exponentialRampToValueAtTime(.001,s+d);
  o.connect(g);g.connect(ctx.destination);o.start(s);o.stop(s+d);
}

function toggleMusic(){
  var btn=document.getElementById('btnMusic');
  if(!musicOn){
    if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    var t=audioCtx.currentTime+.1;
    for(var i=0;i<melody.length;i+=2) playNote(audioCtx,melody[i],t+melody[i+1]*.5,melody[i+1]*.48,.12);
    musicOn=true;btn.classList.add('on');
    document.getElementById('iconMusic').textContent='🔊';
  }else{
    musicOn=false;
    if(audioCtx){audioCtx.close();audioCtx=null}
    btn.classList.remove('on');
    document.getElementById('iconMusic').textContent='🎵';
  }
}

// 语音唱歌
var singing=false, lineIdx=0;

function startSing(){
  if(singing){stopSing();return}
  if(!('speechSynthesis' in window)){
    document.getElementById('info').textContent='你的浏览器不支持语音合成';
    return;
  }
  if(!musicOn) toggleMusic();
  singing=true;lineIdx=0;
  document.getElementById('btnSing').classList.add('on');
  document.getElementById('iconSing').textContent='⏹';
  document.getElementById('info').textContent='🎤 正在唱歌中...';
  document.getElementById('mic').classList.add('on');
  speakOne();
}

function speakOne(){
  if(!singing||lineIdx>=allLineEls.length){stopSing();return}
  var el=allLineEls[lineIdx];
  var txt=el.getAttribute('data-text')||el.textContent;
  // 高亮
  for(var i=0;i<allLineEls.length;i++) allLineEls[i].classList.remove('hi');
  el.classList.add('hi');
  el.scrollIntoView({behavior:'smooth',block:'center'});
  // 进度
  var pct=Math.round((lineIdx+1)/allLineEls.length*100);
  document.getElementById('barFill').style.width=pct+'%';
  document.getElementById('info').textContent='🎤 第 '+(lineIdx+1)+'/'+allLineEls.length+' 句';
  // 语音
  var utt=new SpeechSynthesisUtterance(txt);
  utt.lang='zh-CN';
  utt.rate=0.9;
  utt.pitch=1.1;
  utt.volume=1;
  // 选中文语音
  var voices=speechSynthesis.getVoices();
  for(var j=0;j<voices.length;j++){
    if(voices[j].lang.indexOf('zh')===0){utt.voice=voices[j];break}
  }
  utt.onend=function(){lineIdx++;if(singing)setTimeout(speakOne,500)};
  utt.onerror=function(){lineIdx++;if(singing)setTimeout(speakOne,300)};
  speechSynthesis.speak(utt);
}

function stopSing(){
  singing=false;
  speechSynthesis.cancel();
  document.getElementById('btnSing').classList.remove('on');
  document.getElementById('iconSing').textContent='🎤';
  document.getElementById('mic').classList.remove('on');
  document.getElementById('barFill').style.width='0%';
  document.getElementById('info').textContent='✅ 演唱完毕！点击重新开始';
  for(var i=0;i<allLineEls.length;i++) allLineEls[i].classList.remove('hi');
}

// 预加载语音
if(speechSynthesis.onvoiceschanged!==undefined){
  speechSynthesis.onvoiceschanged=function(){speechSynthesis.getVoices()};
}
</script>
</body>
</html>
